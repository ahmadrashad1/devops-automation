services:
  - name: devops-automation-api
    type: web
    runtime: docker
    region: oregon
    plan: starter
    autoDeployTrigger: commit
    dockerfilePath: ./infra/docker/api.Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "3010"
      - key: NODE_ENV
        value: production
      - key: JOB_QUEUE_NAME
        value: jobs
      - key: DATABASE_URL
        fromDatabase:
          name: devops-automation-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: devops-automation-redis
          type: keyvalue
          property: connectionString
      - key: DASHBOARD_ORIGIN
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

  - name: devops-automation-dashboard
    type: web
    runtime: docker
    region: oregon
    plan: starter
    autoDeployTrigger: commit
    dockerfilePath: ./infra/docker/dashboard.Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: API_PROXY_TARGET
        fromService:
          name: devops-automation-api
          type: web
          property: hostport

  - name: devops-automation-worker
    type: worker
    runtime: docker
    region: oregon
    plan: starter
    autoDeployTrigger: commit
    dockerfilePath: ./infra/docker/worker.Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: JOB_QUEUE_NAME
        value: jobs
      - key: JOB_EXECUTOR
        value: direct
      - key: API_BASE_URL
        value: http://devops-automation-api:10000
      - key: REDIS_URL
        fromService:
          name: devops-automation-redis
          type: keyvalue
          property: connectionString

  - name: devops-automation-redis
    type: keyvalue
    ipAllowList: []
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: devops-automation-postgres
    plan: basic-256mb
    region: oregon

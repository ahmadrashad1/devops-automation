name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npx -y pnpm@10.32.1 install --frozen-lockfile

      - name: Approve build scripts
        run: npx -y pnpm@10.32.1 approve-builds --all

      - name: Build API
        run: npx -y pnpm@10.32.1 --filter api build

      - name: Build Worker
        run: npx -y pnpm@10.32.1 --filter worker build

      - name: Build Dashboard
        run: npx -y pnpm@10.32.1 --filter dashboard build


name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm -v

      # Build script allowlist lives in pnpm-workspace.yaml (allowBuilds).
      # Avoid `approve-builds` in CI — not required once policy is committed (pnpm guidance).

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter api build

      - name: Build Worker
        run: pnpm --filter worker build

      - name: Build Dashboard
        run: pnpm --filter dashboard build

